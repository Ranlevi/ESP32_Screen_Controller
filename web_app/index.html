<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Dashboard</title>
  <style>
    :root {
      --bg:      #080e1e;
      --panel:   #0f1728;
      --panel-2: #0c1321;
      --surface: #141f38;
      --text:    #e7ecff;
      --muted:   #7a8fb8;
      --dim:     #3a4d7a;
      --accent:  #38c8ff;
      --green:   #4debb8;
      --purple:  #b48eff;
      --amber:   #ffd166;
      --danger:  #ff6b7a;
      --border:  #1e2d58;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 70% 0%, #0d1d50 0%, transparent 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .app {
      max-width: 1040px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(56,200,255,0.05);
    }

    /* ── Header ── */
    .header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(90deg, #0e1830 0%, var(--panel) 100%);
    }

    .title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .conn-dot.on {
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
      flex-wrap: wrap;
    }

    button {
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: filter 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { filter: brightness(1.14); }
    button:disabled { opacity: 0.36; cursor: not-allowed; }

    .btn-connect    { border-color: #2a6e96; background: #0e2e44; color: var(--accent); }
    .btn-disconnect { border-color: #7a2f3a; background: #3a1520; color: var(--danger); }
    .btn-send       { border-color: #2a5e48; background: #102b20; color: var(--green); }
    .btn-oled       { border-color: #5a3e9a; background: #201235; color: var(--purple); }

    .toolbar-info { margin-left: auto; font-size: 0.78rem; color: var(--muted); }
    code {
      background: #090f22;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: Consolas, monospace;
      color: var(--text);
    }

    /* ── Generic section wrapper ── */
    .section {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 12px;
    }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      overflow: hidden;
    }

    /* coloured top stripe */
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-color, var(--border));
    }

    .stat-label {
      font-size: 0.69rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .stat-value {
      font-family: Consolas, "Courier New", monospace;
      font-size: 1.38rem;
      font-weight: 600;
      color: var(--card-color, var(--text));
      line-height: 1.15;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .stat-unit {
      font-size: 0.68rem;
      color: var(--dim);
      min-height: 0.9em;
    }

    @keyframes flash {
      from { opacity: 0.35; }
      to   { opacity: 1; }
    }
    .stat-value.pop { animation: flash 0.4s ease-out; }

    /* ── OLED selector ── */
    .oled-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .oled-option input[type=radio] { display: none; }

    .oled-option label {
      cursor: pointer;
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      user-select: none;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .oled-option label:hover { filter: brightness(1.18); }

    .oled-option input[type=radio]:checked + label {
      border-color: var(--purple);
      color: var(--purple);
      background: #180d30;
      box-shadow: 0 0 8px rgba(180,142,255,0.22);
    }

    /* ── Task runtime table ── */
    .task-placeholder { color: var(--dim); font-size: 0.82rem; font-style: italic; }

    .task-table {
      width: 100%;
      border-collapse: collapse;
      font-family: Consolas, monospace;
      font-size: 0.81rem;
    }
    .task-table th {
      text-align: left;
      color: var(--dim);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px 7px;
      border-bottom: 1px solid var(--border);
    }
    .task-table td { padding: 4px 10px; color: var(--text); }
    .task-table tr:nth-child(even) td { background: rgba(255,255,255,0.018); }

    .pct-bar {
      display: inline-block;
      height: 5px;
      border-radius: 3px;
      background: var(--accent);
      opacity: 0.45;
      margin-left: 7px;
      vertical-align: middle;
    }

    /* ── Terminal ── */
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.76rem;
      cursor: pointer;
      padding: 2px 8px;
    }
    .toggle-btn:hover { color: var(--text); }

    .terminal-wrap.hidden { display: none; }

    .terminal {
      height: 200px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: #040a17;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tx        { color: var(--green); }
    .rx        { color: var(--accent); }
    .rx-json   { color: #2a3f68; }   /* dimmed — parsed JSON, dashboard handles it */
    .sys       { color: var(--muted); }
    .err       { color: var(--danger); }

    /* ── Composer ── */
    .composer {
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: var(--panel-2);
    }

    #txInput {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #080f1e;
      color: var(--text);
      padding: 9px 12px;
      min-height: 42px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 0.83rem;
    }
    #txInput:focus { outline: none; border-color: #2a4a7a; }

    .options {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 580px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<main class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="title">ESP32 Dashboard</div>
    <div class="conn-badge">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Disconnected</span>
    </div>
  </header>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <button id="connectBtn"    class="btn-connect">Connect</button>
    <button id="disconnectBtn" class="btn-disconnect" disabled>Disconnect</button>
    <span class="toolbar-info">Baud: <code>115200</code></span>
  </div>

  <!-- ── Stats Grid ── -->
  <section class="section">
    <div class="section-label">System Stats</div>
    <div class="stats-grid" id="statsGrid"></div>
  </section>

  <!-- ── OLED Selector ── -->
  <section class="section">
    <div class="section-label">OLED Display</div>
    <div class="oled-options" id="oledOptions"></div>
    <button class="btn-oled" id="setOledBtn" disabled>Set OLED Display</button>
  </section>

  <!-- ── Task Runtime ── -->
  <section class="section">
    <div class="section-label">Task Runtime</div>
    <p class="task-placeholder" id="taskPlaceholder">Waiting for data…</p>
    <table class="task-table" id="taskTable" style="display:none">
      <thead><tr>
        <th>Task</th>
        <th>Abs Runtime</th>
        <th>CPU %</th>
      </tr></thead>
      <tbody id="taskBody"></tbody>
    </table>
  </section>

  <!-- ── Terminal ── -->
  <section class="section">
    <div class="section-row">
      <div class="section-label" style="margin:0">Terminal</div>
      <button class="toggle-btn" id="termToggle">▼ Hide</button>
    </div>
    <div class="terminal-wrap" id="terminalWrap">
      <div class="terminal" id="terminal" aria-live="polite"></div>
    </div>
  </section>

  <!-- ── Composer ── -->
  <div class="composer">
    <textarea id="txInput" placeholder="Type to send…"></textarea>
    <button id="sendBtn" class="btn-send" disabled>Send</button>
    <label class="options">
      <input type="checkbox" id="appendNewline" checked />
      Append \r\n
    </label>
  </div>

</main>
<script>
'use strict';

// ─── Stat definitions ─────────────────────────────────────────────────────────

const RESET_REASONS = {
  0:'Unknown', 1:'Power On', 2:'Ext Pin', 3:'Software',
  4:'Panic',   5:'Int WDT',  6:'Task WDT', 7:'WDT',
  8:'Deep Sleep', 9:'Brownout', 10:'SDIO',
};

function fmtUptime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
}
function fmtKB(b)    { return (b / 1024).toFixed(1); }
function fmtBytes(b) {
  if (b >= 1048576) return (b / 1048576).toFixed(2) + ' MB';
  if (b >= 1024)    return (b / 1024).toFixed(1) + ' KB';
  return b + ' B';
}

// key, display label, top-stripe colour, value formatter, unit label
const STAT_DEFS = [
  { key:'uptime_s',        label:'Uptime',       color:'#38c8ff', fmt: v => fmtUptime(v),                      unit:'hh : mm : ss' },
  { key:'free_heap_b',     label:'Free Heap',    color:'#4debb8', fmt: v => fmtKB(v),                          unit:'KB' },
  { key:'min_free_heap_b', label:'Min Free Heap',color:'#4debb8', fmt: v => fmtKB(v),                          unit:'KB' },
  { key:'task_count',      label:'Tasks',        color:'#b48eff', fmt: v => v,                                  unit:'' },
  { key:'cpu_freq_mhz',    label:'CPU Freq',     color:'#b48eff', fmt: v => v,                                  unit:'MHz' },
  { key:'idf_version',     label:'IDF Version',  color:'#7a8fb8', fmt: v => v,                                  unit:'' },
  { key:'bytes_rx',        label:'Serial RX',    color:'#38c8ff', fmt: v => fmtBytes(v),                       unit:'' },
  { key:'bytes_tx',        label:'Serial TX',    color:'#38c8ff', fmt: v => fmtBytes(v),                       unit:'' },
  { key:'reset_reason',    label:'Reset Reason', color:'#ffd166', fmt: v => RESET_REASONS[v] ?? ('Code '+v),   unit:'' },
];

// ─── Build stats grid ─────────────────────────────────────────────────────────

const statsGrid = document.getElementById('statsGrid');
for (const d of STAT_DEFS) {
  const card = document.createElement('div');
  card.className = 'stat-card';
  card.style.setProperty('--card-color', d.color);
  card.innerHTML =
    `<div class="stat-label">${d.label}</div>` +
    `<div class="stat-value" id="sv-${d.key}">—</div>` +
    `<div class="stat-unit">${d.unit}</div>`;
  statsGrid.appendChild(card);
}

// ─── Build OLED options ───────────────────────────────────────────────────────

const oledOptions = document.getElementById('oledOptions');
for (const d of STAT_DEFS) {
  const wrap = document.createElement('span');
  wrap.className = 'oled-option';
  wrap.innerHTML =
    `<input type="radio" name="oled" id="oled-${d.key}" value="${d.key}">` +
    `<label for="oled-${d.key}">${d.label}</label>`;
  oledOptions.appendChild(wrap);
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────

const termEl         = document.getElementById('terminal');
const termWrap       = document.getElementById('terminalWrap');
const termToggleBtn  = document.getElementById('termToggle');
const connDot        = document.getElementById('connDot');
const connLabel      = document.getElementById('connLabel');
const connectBtn     = document.getElementById('connectBtn');
const disconnectBtn  = document.getElementById('disconnectBtn');
const sendBtn        = document.getElementById('sendBtn');
const setOledBtn     = document.getElementById('setOledBtn');
const txInput        = document.getElementById('txInput');
const appendNlEl     = document.getElementById('appendNewline');
const taskPlaceholder = document.getElementById('taskPlaceholder');
const taskTable      = document.getElementById('taskTable');
const taskBody       = document.getElementById('taskBody');

// ─── Serial state ─────────────────────────────────────────────────────────────

let port        = null;
let reader      = null;
let writer      = null;
let keepReading = false;
let rxBuf       = '';

// ─── UI helpers ───────────────────────────────────────────────────────────────

function log(cls, text) {
  const el = document.createElement('div');
  el.className = cls;
  el.textContent = text;
  termEl.appendChild(el);
  while (termEl.childElementCount > 600) termEl.removeChild(termEl.firstChild);
  termEl.scrollTop = termEl.scrollHeight;
}

function setConnected(on) {
  connectBtn.disabled    = on;
  disconnectBtn.disabled = !on;
  sendBtn.disabled       = !on;
  setOledBtn.disabled    = !on;
  connDot.classList.toggle('on', on);
  connLabel.textContent  = on ? 'Connected' : 'Disconnected';
}

function flashStat(key) {
  const el = document.getElementById('sv-' + key);
  if (!el) return;
  el.classList.remove('pop');
  void el.offsetWidth;           // force reflow to restart animation
  el.classList.add('pop');
}

function setStat(key, rawVal) {
  const def = STAT_DEFS.find(d => d.key === key);
  if (!def) return;
  const el  = document.getElementById('sv-' + key);
  if (!el)  return;
  const str = String(def.fmt(rawVal));
  if (el.textContent !== str) { el.textContent = str; flashStat(key); }
}

// ─── Incoming JSON handling ───────────────────────────────────────────────────

function handleParsed(obj) {
  // system stats frame
  for (const d of STAT_DEFS) {
    if (d.key in obj) setStat(d.key, obj[d.key]);
  }

  // task runtime frame
  if ('task_runtime' in obj) {
    // obj.task_runtime is already a JS string with real \n and \t chars
    const rows = obj.task_runtime
      .split('\n')
      .map(line => line.split('\t').filter(s => s.trim() !== ''))
      .filter(cols => cols.length >= 2);

    if (rows.length > 0) {
      taskBody.innerHTML = '';
      for (const [name, abs, pct] of rows) {
        const num = pct ? (parseInt(pct.replace(/\D/g, ''), 10) || 0) : 0;
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td>${name ?? ''}</td>` +
          `<td>${abs ?? ''}</td>` +
          `<td>${pct ?? ''}` +
            `<span class="pct-bar" style="width:${Math.min(num, 100) * 0.55}px"></span>` +
          `</td>`;
        taskBody.appendChild(tr);
      }
      taskPlaceholder.style.display = 'none';
      taskTable.style.display       = 'table';
    }
  }
}

function processLine(line) {
  let parsed = false;
  try {
    const obj = JSON.parse(line);
    if (obj && typeof obj === 'object') {
      handleParsed(obj);
      parsed = true;
    }
  } catch (_) {}
  log(parsed ? 'rx-json' : 'rx', 'RX: ' + line);
}

// ─── Read loop ────────────────────────────────────────────────────────────────

async function readLoop() {
  const dec = new TextDecoder();
  try {
    while (keepReading && port?.readable) {
      reader = port.readable.getReader();
      try {
        while (keepReading) {
          const { value, done } = await reader.read();
          if (done) break;
          if (value?.length) {
            rxBuf += dec.decode(value, { stream: true });
            const lines = rxBuf.split(/\r?\n/);
            rxBuf = lines.pop() ?? '';
            for (const line of lines) processLine(line);
          }
        }
      } finally {
        reader.releaseLock();
        reader = null;
      }
    }
  } catch (e) {
    log('err', 'Read error: ' + e.message);
  }
}

// ─── Connect / Disconnect ─────────────────────────────────────────────────────

async function connect() {
  if (!('serial' in navigator)) {
    log('err', 'Web Serial API not supported. Use Chrome or Edge.');
    return;
  }
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    writer = port.writable.getWriter();
    keepReading = true;
    setConnected(true);
    log('sys', 'Connected.');
    readLoop();
  } catch (e) {
    log('err', 'Connect failed: ' + e.message);
  }
}

async function disconnect() {
  keepReading = false;
  try { if (reader) await reader.cancel(); } catch (_) {}
  try { if (writer) { writer.releaseLock(); writer = null; } } catch (_) {}
  try {
    if (port) await port.close();
  } catch (e) {
    log('err', 'Disconnect warning: ' + e.message);
  } finally {
    if (rxBuf) { log('rx', 'RX: ' + rxBuf); rxBuf = ''; }
    port = null;
    setConnected(false);
    log('sys', 'Disconnected.');
  }
}

// ─── Send ────────────────────────────────────────────────────────────────────

async function send(text) {
  if (!writer || !text) return;
  const payload = appendNlEl.checked ? text + '\r\n' : text;
  try {
    await writer.write(new TextEncoder().encode(payload));
    log('tx', 'TX: ' + text);
  } catch (e) {
    log('err', 'Send failed: ' + e.message);
  }
}

// ─── Event wiring ─────────────────────────────────────────────────────────────

connectBtn.addEventListener('click', connect);
disconnectBtn.addEventListener('click', disconnect);

sendBtn.addEventListener('click', () => {
  const t = txInput.value.trim();
  if (!t) return;
  send(t);
  txInput.value = '';
  txInput.focus();
});

txInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendBtn.click(); }
});

setOledBtn.addEventListener('click', () => {
  const sel = document.querySelector('input[name=oled]:checked');
  if (!sel) { log('sys', 'Select a stat first.'); return; }
  send('OLED:' + sel.value);
});

termToggleBtn.addEventListener('click', () => {
  const hidden = termWrap.classList.toggle('hidden');
  termToggleBtn.textContent = hidden ? '▶ Show' : '▼ Hide';
});

navigator.serial?.addEventListener('disconnect', async () => {
  if (port) await disconnect();
});

// ─── Init ─────────────────────────────────────────────────────────────────────

setConnected(false);
log('sys', 'Ready. Click Connect to open the ESP32 serial port.');
log('sys', 'Tip: Ctrl+Enter to send  •  parsed JSON lines are dimmed.');
</script>
</body>
</html>
