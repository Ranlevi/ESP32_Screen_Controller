<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32 Web Serial Terminal</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131b33;
      --panel-2: #0f172d;
      --text: #e7ecff;
      --muted: #9fb0de;
      --accent: #56d0ff;
      --accent-2: #69f0ae;
      --danger: #ff6b7a;
      --border: #2a3665;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #1d2c5a 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 12px;
      color: var(--text);
      background: #18244a;
      cursor: pointer;
      font-size: 0.92rem;
    }

    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .connect { border-color: #2f7ea0; background: #16384b; }
    .disconnect { border-color: #87404a; background: #3d1f27; }
    .send { border-color: #3a805f; background: #1c4334; }

    .terminal {
      margin: 16px 18px;
      height: 320px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #0a1125;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.92rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tx { color: var(--accent-2); }
    .rx { color: var(--accent); }
    .sys { color: var(--muted); }
    .err { color: var(--danger); }

    .composer {
      padding: 0 18px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    #txInput {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1430;
      color: var(--text);
      padding: 10px;
      min-height: 48px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
    }

    .options {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    code {
      background: #0c1636;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 5px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="title">ESP32 Web Serial Terminal</div>
      <div id="status" class="status">Disconnected</div>
    </section>

    <section class="toolbar">
      <button id="connectBtn" class="connect">Connect</button>
      <button id="disconnectBtn" class="disconnect" disabled>Disconnect</button>
      <span class="status">Baud: <code>115200</code></span>
    </section>

    <section id="terminal" class="terminal" aria-live="polite"></section>

    <section class="composer">
      <textarea id="txInput" placeholder="Type raw text to send..."></textarea>
      <button id="sendBtn" class="send" disabled>Send</button>
      <label class="options">
        <input type="checkbox" id="appendNewline" checked />
        Append newline (\r\n)
      </label>
    </section>
  </main>

  <script>
    const BAUD_RATE = 115200;

    const statusEl = document.getElementById("status");
    const terminalEl = document.getElementById("terminal");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const sendBtn = document.getElementById("sendBtn");
    const txInput = document.getElementById("txInput");
    const appendNewlineEl = document.getElementById("appendNewline");

    let port = null;
    let reader = null;
    let writer = null;
    let keepReading = false;
    let rxPending = "";

    function appendLine(kind, text) {
      const line = document.createElement("div");
      line.className = kind;
      line.textContent = text;
      terminalEl.appendChild(line);
      terminalEl.scrollTop = terminalEl.scrollHeight;
    }

    function setConnectedUi(connected) {
      connectBtn.disabled = connected;
      disconnectBtn.disabled = !connected;
      sendBtn.disabled = !connected;
      statusEl.textContent = connected ? "Connected" : "Disconnected";
    }

    async function readLoop() {
      const decoder = new TextDecoder();

      try {
        while (keepReading && port?.readable) {
          reader = port.readable.getReader();
          try {
            while (keepReading) {
              const { value, done } = await reader.read();
              if (done) {
                break;
              }

              if (value && value.length > 0) {
                const text = decoder.decode(value, { stream: true });
                rxPending += text;

                const lines = rxPending.split(/\r?\n/);
                rxPending = lines.pop() ?? "";

                for (const line of lines) {
                  appendLine("rx", "RX: " + line);
                }
              }
            }
          } finally {
            reader.releaseLock();
            reader = null;
          }
        }
      } catch (error) {
        appendLine("err", "Read error: " + error.message);
      }
    }

    async function connect() {
      if (!("serial" in navigator)) {
        appendLine("err", "Web Serial API not supported in this browser.");
        return;
      }

      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: BAUD_RATE });
        writer = port.writable.getWriter();
        keepReading = true;
        setConnectedUi(true);
        appendLine("sys", "Connected.");
        readLoop();
      } catch (error) {
        appendLine("err", "Connect failed: " + error.message);
      }
    }

    async function disconnect() {
      keepReading = false;

      try {
        if (reader) {
          await reader.cancel();
        }
      } catch (_) {
      }

      try {
        if (writer) {
          writer.releaseLock();
          writer = null;
        }
      } catch (_) {
      }

      try {
        if (port) {
          await port.close();
        }
      } catch (error) {
        appendLine("err", "Disconnect warning: " + error.message);
      } finally {
        if (rxPending.length > 0) {
          appendLine("rx", "RX: " + rxPending);
          rxPending = "";
        }
        port = null;
        setConnectedUi(false);
        appendLine("sys", "Disconnected.");
      }
    }

    async function sendText() {
      const text = txInput.value;
      if (!writer || text.length === 0) {
        return;
      }

      const payload = appendNewlineEl.checked ? text + "\r\n" : text;
      const data = new TextEncoder().encode(payload);

      try {
        await writer.write(data);
        appendLine("tx", "TX: " + payload);
        txInput.value = "";
        txInput.focus();
      } catch (error) {
        appendLine("err", "Send failed: " + error.message);
      }
    }

    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    sendBtn.addEventListener("click", sendText);

    txInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        sendText();
      }
    });

    navigator.serial?.addEventListener("disconnect", async () => {
      if (port) {
        await disconnect();
      }
    });

    appendLine("sys", "Ready. Click Connect to select the ESP32 serial port.");
    appendLine("sys", "Tip: use Ctrl+Enter to send.");
  </script>
</body>
</html>
